<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>File Risk Analyser</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00f5ff;
    --cyan-dim: rgba(0,245,255,0.15);
    --red: #ff3c5c;
    --bg: #030b18;
    --surface: #060f1f;
    --border: rgba(0,245,255,0.18);
    --text: #cce8f4;
    --muted: #4a7a9b;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 800px; height: 800px;
    background: radial-gradient(ellipse, rgba(0,80,120,0.18) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .panel {
    position: relative;
    z-index: 1;
    width: 460px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 36px 32px 30px;
    box-shadow: 0 0 60px rgba(0,245,255,0.07), inset 0 0 40px rgba(0,0,0,0.3);
    animation: fadeUp 0.6s ease both;
  }

  .panel::before, .panel::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    border-color: var(--cyan);
    border-style: solid;
  }
  .panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .panel::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .brand-icon {
    width: 38px; height: 38px;
    background: var(--cyan-dim);
    border: 1px solid var(--border);
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
  }

  .brand-title {
    font-size: 1.55rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    text-shadow: 0 0 18px rgba(0,245,255,0.4);
  }

  .subtitle {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 28px;
    font-family: 'Share Tech Mono', monospace;
  }

  .section-label {
    font-size: 0.7rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .file-drop {
    border: 1px dashed rgba(0,245,255,0.25);
    border-radius: 4px;
    padding: 16px 12px;
    background: rgba(0,245,255,0.03);
    cursor: pointer;
    transition: border-color 0.25s, background 0.25s;
    margin-bottom: 10px;
    position: relative;
  }
  .file-drop:hover {
    border-color: rgba(0,245,255,0.5);
    background: rgba(0,245,255,0.06);
  }
  .file-drop input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .file-drop-inner {
    display: flex; align-items: center; gap: 10px;
  }
  .file-drop-icon {
    font-size: 1.4rem; opacity: 0.7;
  }
  .file-drop-text {
    font-size: 0.85rem;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
  }
  .file-drop-text span {
    color: var(--cyan);
    font-weight: 600;
  }

  .scan-btn {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border-radius: 3px;
    cursor: pointer;
    margin-bottom: 18px;
  }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 4px 0 18px;
    color: var(--muted);
    font-size: 0.7rem;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 0.1em;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .history-btn {
    display: block;
    text-align: center;
    padding: 9px;
    border: 1px solid rgba(0,245,255,0.2);
    color: var(--muted);
    text-decoration: none;
  }

  .status-bar {
    display: flex; justify-content: space-between;
    margin-top: 24px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
</style>
</head>

<body>

<div class="panel">

  <div class="brand">
    <div class="brand-icon">🛡</div>
    <div class="brand-title">FILE RISK ANALYSER</div>
  </div>

  <div class="subtitle">// File Threat Detector</div>

  <!-- FILE SCAN -->
  <div class="section-label">Single File Scan</div>
  <form action="/scan/" method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="file-drop">
      <div class="file-drop-inner">
        <div class="file-drop-icon">📄</div>
        <div class="file-drop-text" id="fileText">
          <span>Choose file</span>
        </div>
      </div>
      <input type="file" name="file" id="fileInput" required>
    </div>

    <button type="submit" name="scan_type" value="file" class="scan-btn">
      ⟶ Initiate File Scan
    </button>
  </form>

  <div class="divider">or</div>

  <!-- FOLDER SCAN -->
  <div class="section-label">Folder Scan</div>
  <form action="/scan/" method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="file-drop">
      <div class="file-drop-inner">
        <div class="file-drop-icon">📁</div>
        <!-- ✅ UPDATED -->
        <div class="file-drop-text" id="folderText">
          <span>Choose folder</span>
        </div>
      </div>
      <input type="file" name="files" id="folderInput" webkitdirectory directory multiple required>
    </div>

    <button type="submit" name="scan_type" value="folder" class="scan-btn">
      ⟶ Initiate Folder Scan
    </button>
  </form>

  <a href="/history/" class="history-btn">📜 View Scan History</a>

</div>

<script>
document.getElementById("fileInput").addEventListener("change", function() {
    if (this.files.length > 0) {
        document.getElementById("fileText").innerHTML =
            "<span>" + this.files[0].name + "</span>";
    }
});

document.getElementById("folderInput").addEventListener("change", function() {
    if (this.files.length > 0) {
        document.getElementById("folderText").innerHTML =
            "<span>" + this.files.length + " files selected</span>";
    }
});
</script>

</body>
</html>
